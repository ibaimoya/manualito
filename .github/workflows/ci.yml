name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint con Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==0.11.13

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Comprobar lint con Ruff
        run: uv run --locked --no-default-groups --only-group test ruff check backend tests --output-format=github

  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UV_CACHE_DIR: .cache/uv

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==0.11.13

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Ejecutar tests
        run: uv run --locked --no-default-groups --only-group test pytest -v
