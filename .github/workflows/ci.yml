name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint con Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Comprobar lint con Ruff
        uses: astral-sh/ruff-action@v4
        with:
          version: 0.15.12
          args: "check backend/ --select=E,F,W,I,B,UP,SIM,N,C4,RUF --output-format=github"

  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: tests/requirements-test.txt

      - name: Instalar dependencias de test
        run: pip install -r tests/requirements-test.txt

      - name: Ejecutar tests
        working-directory: tests
        run: python -m pytest -v
