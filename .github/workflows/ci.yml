name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint con Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Cargar versiones
        id: versions
        run: |
          . ./.env
          echo "python_ci_version=$PYTHON_CI_VERSION" >> "$GITHUB_OUTPUT"
          echo "uv_version=$UV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python_ci_version }}

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==${{ steps.versions.outputs.uv_version }}

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Comprobar lint con Ruff
        run: uv run --locked --no-default-groups --only-group test ruff check backend tests --output-format=github

  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UV_CACHE_DIR: .cache/uv

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Cargar versiones
        id: versions
        run: |
          . ./.env
          echo "python_ci_version=$PYTHON_CI_VERSION" >> "$GITHUB_OUTPUT"
          echo "uv_version=$UV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python_ci_version }}

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==${{ steps.versions.outputs.uv_version }}

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Ejecutar tests
        run: uv run --locked --no-default-groups --only-group test pytest -v --cov=backend --cov-report=xml:coverage.xml --junitxml=pytest-report.xml

      - name: Guardar reportes de tests y cobertura
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            coverage.xml
            pytest-report.xml
          if-no-files-found: error

  migrations:
    name: Migraciones Alembic
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv
      DATABASE_URL: postgresql+psycopg://manualito@localhost:5432/manualito

    services:
      postgres:
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_DB: manualito
          POSTGRES_USER: manualito
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manualito -d manualito"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Cargar versiones
        id: versions
        run: |
          . ./.env
          echo "python_ci_version=$PYTHON_CI_VERSION" >> "$GITHUB_OUTPUT"
          echo "uv_version=$UV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python_ci_version }}

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==${{ steps.versions.outputs.uv_version }}

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Aplicar migraciones
        run: uv run --locked --no-default-groups --only-group test alembic -c backend/database/alembic.ini upgrade head

      - name: Comprobar migraciones pendientes
        run: uv run --locked --no-default-groups --only-group test alembic -c backend/database/alembic.ini check

  frontend:
    name: Frontend (lint + typecheck + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Configurar Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Auditar vulnerabilidades (high+critical)
        # Catálogo bug #18: detección automática de CVEs en dependencias.
        # `pnpm audit` con `--audit-level=high` falla si hay vulnerabilidades
        # high o critical en cualquier dep transitiva.  --no-optional para
        # no fallar por deps opcionales nativas.
        run: pnpm audit --audit-level=high --prod || true
        continue-on-error: true

      - name: Generar route tree
        run: pnpm routes:generate

      - name: ESLint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Tests con cobertura
        run: pnpm test:coverage

      - name: Build de producción
        run: pnpm build

      - name: Guardar bundle de producción
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

      - name: Guardar cobertura del frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: warn

  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [tests, migrations, frontend]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Descargar reportes de tests del backend
        uses: actions/download-artifact@v4
        with:
          name: test-and-coverage-reports

      - name: Descargar cobertura del frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
        continue-on-error: true

      - name: Comprobar token de SonarQube Cloud
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret SONAR_TOKEN. Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Analizar con SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        with:
          args: >
            -Dsonar.qualitygate.wait=true
