name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint con Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_CACHE_DIR: .cache/uv

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==0.11.13

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Comprobar lint con Ruff
        run: uv run --locked --no-default-groups --only-group test ruff check backend tests --output-format=github

  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UV_CACHE_DIR: .cache/uv

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de uv
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Instalar uv
        run: python -m pip install uv==0.11.13

      - name: Instalar dependencias de test
        run: uv sync --locked --no-default-groups --only-group test

      - name: Ejecutar tests
        run: uv run --locked --no-default-groups --only-group test pytest -v --cov=backend --cov-report=xml:coverage.xml --junitxml=pytest-report.xml

      - name: Guardar reportes de tests y cobertura
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            coverage.xml
            pytest-report.xml
          if-no-files-found: error

  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: tests
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Descargar reportes de tests y cobertura
        uses: actions/download-artifact@v4
        with:
          name: test-and-coverage-reports

      - name: Comprobar token de SonarQube Cloud
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret SONAR_TOKEN. Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Analizar con SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        with:
          args: >
            -Dsonar.qualitygate.wait=true
