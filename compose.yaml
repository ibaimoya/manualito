name: ${PROYECT_NAME:-manualito}

x-service-hardening: &service-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
  pids_limit: 256

x-third-party-hardening: &third-party-hardening
  security_opt:
    - no-new-privileges:true

x-api-build: &api-build
  context: .
  dockerfile: backend/api/Dockerfile
  additional_contexts:
    - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
  args:
    PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}

x-database-build: &database-build
  context: .
  dockerfile: backend/database/Dockerfile
  additional_contexts:
    - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
  args:
    PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}

# Variante para nginx
x-service-hardening-nginx: &service-hardening-nginx
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777,uid=1001,gid=1001
    - /var/cache/nginx:rw,noexec,nosuid,nodev,size=64m,uid=1001,gid=1001
    - /var/run:rw,noexec,nosuid,nodev,size=4m,uid=1001,gid=1001
    - /var/log/nginx:rw,noexec,nosuid,nodev,size=32m,uid=1001,gid=1001
  pids_limit: 100

services:

  python-base:
    build:
      context: .
      dockerfile: backend/python-base/Dockerfile
      args:
        UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}
        PYTHON_VERSION: ${PYTHON_VERSION:?PYTHON_VERSION no definida}
        VERSION: ${PYTHON_IMAGE_VERSION:-0.0.1}
    scale: 0
    network_mode: none

  api:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-api
    env_file:
      - ./config/backend.env
      - ./config/database.env
    image: ${PROYECT_NAME:-manualito}-api:${API_IMAGE_VERSION:-local}
    build: *api-build
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - manual-assets-data:/app/storage/manual-assets
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      ocr:
        condition: service_healthy
      rag:
        condition: service_healthy
      llm:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - manualito-net

  database-migrate:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-database-migrate
    env_file:
      - ./config/database.env
    image: ${PROYECT_NAME:-manualito}-database:${DATABASE_IMAGE_VERSION:-local}
    build: *database-build
    secrets:
      - postgres_user
      - postgres_password
    depends_on:
      database:
        condition: service_healthy
    restart: "no"
    networks:
      - manualito-net

  database:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-database
    image: postgres:18.4-alpine3.23
    env_file:
      - ./config/database.env
    secrets:
      - postgres_user
      - postgres_password
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$(cat /run/secrets/postgres_user)\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - database-data:/var/lib/postgresql
    networks:
      - manualito-net

  ocr:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-ocr
    env_file:
      - ./config/backend.env
    image: ${PROYECT_NAME:-manualito}-ocr:cpu
    build:
      context: .
      dockerfile: backend/ocr/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        OCR_RUNTIME_STAGE: ${OCR_RUNTIME_STAGE:-tesseract}
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    environment:
      OCR_ENGINE: ${OCR_RUNTIME_STAGE:-tesseract}
    networks:
      - manualito-net

  rag:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-rag
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/rag/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    volumes:
      - rag-hf-cache:/home/appuser/.cache/huggingface
    depends_on:
      - chroma
    networks:
      - manualito-net

  chroma:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-chroma
    image: chromadb/chroma:${CHROMA_VERSION:-1.5.9}
    pids_limit: 256
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - manualito-net

  llm:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-llm
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/llm/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    networks:
      - manualito-net

  mailpit:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-mailpit
    image: axllent/mailpit:${MAILPIT_VERSION:-v1.30.1}
    pids_limit: 128
    environment:
      MP_MAX_MESSAGES: 1000
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - manualito-net

  ollama:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-ollama
    image: ollama/ollama:${OLLAMA_VERSION:-0.30.4}
    pids_limit: 512
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - manualito-net

  # Descarga el modelo si falta.
  ollama-init:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-ollama-init
    env_file:
      - ./config/backend.env
    image: ollama/ollama:${OLLAMA_VERSION:-0.30.4}
    pids_limit: 128
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull $$OLLAMA_MODEL"]
    restart: "no"
    networks:
      - manualito-net

  frontend:
    <<: *service-hardening-nginx
    container_name: ${PROYECT_NAME:-manualito}-frontend
    build:
      context: ./frontend
      args:
        NODE_VERSION: "26.3.0"
        NGINX_VERSION: "1.29"
        PNPM_VERSION: "11.5.1"
    ports:
      - "5173:8080"
    depends_on:
      api:
        condition: service_started
    networks:
      - manualito-net

networks:
  manualito-net:
    driver: bridge

volumes:
  database-data:
  chromadb-data:
  ollama-data:
  rag-hf-cache:
  manual-assets-data:
  ocr-paddlex-cpu-cache:
  ocr-paddlex-gpu-cache:

secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
