name: ${PROYECT_NAME:?PROYECT_NAME no definida}

x-service-hardening: &service-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
  pids_limit: 256

x-volume-init-hardening: &volume-init-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - FOWNER
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
  pids_limit: 32

x-third-party-hardening: &third-party-hardening
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

x-api-build: &api-build
  context: .
  dockerfile: backend/api/Dockerfile
  additional_contexts:
    - "python-base:${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}=service:python-base"
  args:
    PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}
    UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}

x-flower-build: &flower-build
  context: .
  dockerfile: backend/api/Dockerfile
  additional_contexts:
    - "python-base:${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}=service:python-base"
  args:
    PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}
    UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}
    UV_EXTRA_GROUPS: "--only-group monitoring"

x-database-build: &database-build
  context: .
  dockerfile: backend/database/Dockerfile
  additional_contexts:
    - "python-base:${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}=service:python-base"
  args:
    PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}
    UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}

x-celery-base: &celery-base
  <<: *service-hardening
  env_file:
    - ./config/backend.env
    - ./config/celery.env
    - ./config/database.env
  environment:
    APP_VERSION: ${APP_VERSION:?APP_VERSION no definida}
    REDIS_PASSWORD_FILE: /run/secrets/redis_password
  image: ${PROYECT_NAME:?PROYECT_NAME no definida}-api:${API_IMAGE_VERSION:?API_IMAGE_VERSION no definida}
  build: *api-build
  secrets:
    - postgres_user
    - postgres_password
    - redis_password
  networks:
    - manualito-net

# Variante para nginx
x-service-hardening-nginx: &service-hardening-nginx
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777,uid=1001,gid=1001
    - /var/cache/nginx:rw,noexec,nosuid,nodev,size=64m,uid=1001,gid=1001
    - /var/run:rw,noexec,nosuid,nodev,size=4m,uid=1001,gid=1001
    - /var/log/nginx:rw,noexec,nosuid,nodev,size=32m,uid=1001,gid=1001
  pids_limit: 100

services:

  python-base:
    build:
      context: .
      dockerfile: backend/python-base/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:?PYTHON_VERSION no definida}
        PYTHON_VARIANT: ${PYTHON_VARIANT:-}
        VERSION: ${PYTHON_IMAGE_VERSION:?PYTHON_IMAGE_VERSION no definida}
        APP_UID: ${APP_UID:-65532}
        APP_GID: ${APP_GID:-65532}
    scale: 0
    network_mode: none

  asset-storage-init:
    <<: *volume-init-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-asset-storage-init
    image: ${PROYECT_NAME:?PROYECT_NAME no definida}-api:${API_IMAGE_VERSION:?API_IMAGE_VERSION no definida}
    build: *api-build
    user: "0:0"
    entrypoint: ["/usr/bin/install"]
    command:
      - "-d"
      - "-o"
      - "${APP_UID:-65532}"
      - "-g"
      - "${APP_GID:-65532}"
      - "-m"
      - "0750"
      - "/app/storage/assets"
    volumes:
      - assets-data:/app/storage/assets
    restart: "no"
    network_mode: none

  api:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-api
    env_file:
      - ./config/backend.env
      - ./config/celery.env
      - ./config/database.env
    environment:
      APP_VERSION: ${APP_VERSION:?APP_VERSION no definida}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    image: ${PROYECT_NAME:?PROYECT_NAME no definida}-api:${API_IMAGE_VERSION:?API_IMAGE_VERSION no definida}
    build: *api-build
    secrets:
      - postgres_user
      - postgres_password
      - redis_password
    volumes:
      - assets-data:/app/storage/assets
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      asset-storage-init:
        condition: service_completed_successfully
      database-migrate:
        condition: service_completed_successfully
      ocr:
        condition: service_healthy
      rag:
        condition: service_healthy
      llm:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - manualito-net

  celery-worker-manuals:
    <<: *celery-base
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-celery-worker-manuals
    command:
      - celery
      - -A
      - api.worker.celery:celery_app
      - worker
      - -Q
      - manuals,rag
      - --concurrency=2
      - --events
      - --hostname=manuals@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A api.worker.celery:celery_app inspect ping -d manuals@$$HOSTNAME --timeout=5 | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - assets-data:/app/storage/assets
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      ocr:
        condition: service_healthy
      rag:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker-gpu:
    <<: *celery-base
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-celery-worker-gpu
    command:
      - celery
      - -A
      - api.worker.celery:celery_app
      - worker
      - -Q
      - gpu
      - --concurrency=1
      - --events
      - --hostname=gpu@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A api.worker.celery:celery_app inspect ping -d gpu@$$HOSTNAME --timeout=5 | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - assets-data:/app/storage/assets
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      rag:
        condition: service_healthy
      llm:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker-mail:
    <<: *celery-base
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-celery-worker-mail
    command:
      - celery
      - -A
      - api.worker.celery:celery_app
      - worker
      - -Q
      - mail,maintenance
      - --concurrency=4
      - --events
      - --hostname=mail@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A api.worker.celery:celery_app inspect ping -d mail@$$HOSTNAME --timeout=5 | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy

  celery-beat:
    <<: *celery-base
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-celery-beat
    command:
      - celery
      - -A
      - api.worker.celery:celery_app
      - beat
      - --schedule=/tmp/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; os.kill(1, 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  flower:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-flower
    env_file:
      - ./config/backend.env
      - ./config/celery.env
    environment:
      APP_VERSION: ${APP_VERSION:?APP_VERSION no definida}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    image: ${PROYECT_NAME:?PROYECT_NAME no definida}-flower:${API_IMAGE_VERSION:?API_IMAGE_VERSION no definida}
    build: *flower-build
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        celery -A api.worker.celery:celery_app flower
        --address=0.0.0.0
        --port=5555
        --basic-auth="$$(cat /run/secrets/flower_basic_auth)"
        --persistent=false
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import base64, pathlib, urllib.request; token=base64.b64encode(pathlib.Path('/run/secrets/flower_basic_auth').read_bytes().strip()).decode(); req=urllib.request.Request('http://127.0.0.1:5555', headers={'Authorization': 'Basic ' + token}); urllib.request.urlopen(req, timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    secrets:
      - redis_password
      - flower_basic_auth
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - manualito-net

  database-migrate:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-database-migrate
    env_file:
      - ./config/database.env
    image: ${PROYECT_NAME:?PROYECT_NAME no definida}-database:${DATABASE_IMAGE_VERSION:?DATABASE_IMAGE_VERSION no definida}
    build: *database-build
    secrets:
      - postgres_user
      - postgres_password
    depends_on:
      database:
        condition: service_healthy
    restart: "no"
    networks:
      - manualito-net

  database:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-database
    image: postgres:${POSTGRES_VERSION:?POSTGRES_VERSION no definida}${POSTGRES_VARIANT:+-${POSTGRES_VARIANT}}
    env_file:
      - ./config/database.env
    secrets:
      - postgres_user
      - postgres_password
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$(cat /run/secrets/postgres_user)\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - database-data:/var/lib/postgresql
    networks:
      - manualito-net

  redis:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-redis
    image: redis:${REDIS_VERSION:?REDIS_VERSION no definida}${REDIS_VARIANT:+-${REDIS_VARIANT}}
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
    pids_limit: 128
    secrets:
      - redis_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        set -eu;
        chown -R redis:redis /data;
        password="$$(cat /run/secrets/redis_password)";
        umask 077;
        printf '%s\n' 'appendonly yes' 'dir /data' "requirepass $$password" > /tmp/redis.conf;
        chown redis:redis /tmp/redis.conf;
        exec su redis -s /bin/sh -c "mkdir -p /data/appendonlydir; exec redis-server /tmp/redis.conf"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis-data:/data
    networks:
      - manualito-net

  ocr:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-ocr
    env_file:
      - ./config/backend.env
    image: ${PROYECT_NAME:?PROYECT_NAME no definida}-ocr:cpu
    build:
      context: .
      dockerfile: backend/ocr/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}=service:python-base"
      args:
        OCR_RUNTIME_STAGE: ${OCR_RUNTIME_STAGE:?OCR_RUNTIME_STAGE no definida}
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}
        UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}
    environment:
      OCR_ENGINE: ${OCR_RUNTIME_STAGE:?OCR_RUNTIME_STAGE no definida}
    networks:
      - manualito-net

  rag:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-rag
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/rag/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}
        UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}
    volumes:
      - rag-hf-cache:/home/appuser/.cache/huggingface
    depends_on:
      - chroma
    networks:
      - manualito-net

  chroma:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-chroma
    image: chromadb/chroma:${CHROMA_VERSION:?CHROMA_VERSION no definida}
    pids_limit: 256
    volumes:
      - chromadb-data:/data
    networks:
      - manualito-net

  llm:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-llm
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/llm/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:?PYTHON_BASE_TAG no definida}
        UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    networks:
      - manualito-net

  mailpit:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-mailpit
    image: axllent/mailpit:${MAILPIT_VERSION:?MAILPIT_VERSION no definida}
    pids_limit: 128
    environment:
      MP_MAX_MESSAGES: 1000
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - manualito-net

  ollama:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-ollama
    image: ollama/ollama:${OLLAMA_VERSION:?OLLAMA_VERSION no definida}
    pids_limit: 512
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - manualito-net

  # Descarga el modelo si falta.
  ollama-init:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-ollama-init
    env_file:
      - ./config/backend.env
    image: ollama/ollama:${OLLAMA_VERSION:?OLLAMA_VERSION no definida}
    pids_limit: 128
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull $$OLLAMA_MODEL"]
    restart: "no"
    networks:
      - manualito-net

  frontend:
    <<: *service-hardening-nginx
    container_name: ${PROYECT_NAME:?PROYECT_NAME no definida}-frontend
    build:
      context: ./frontend
      args:
        NODE_VERSION: ${NODE_VERSION:?NODE_VERSION no definida}
        NODE_VARIANT: ${NODE_VARIANT:-}
        NGINX_VERSION: ${NGINX_VERSION:?NGINX_VERSION no definida}
        NGINX_VARIANT: ${NGINX_VARIANT:-}
    ports:
      - "5173:8080"
    depends_on:
      api:
        condition: service_started
    networks:
      - manualito-net

networks:
  manualito-net:
    driver: bridge

volumes:
  database-data:
  chromadb-data:
  ollama-data:
  rag-hf-cache:
  assets-data:
  ocr-paddlex-cpu-cache:
  ocr-paddlex-gpu-cache:
  redis-data:

secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  flower_basic_auth:
    file: ./secrets/flower_basic_auth.txt
