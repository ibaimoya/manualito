x-ocr-engine: &ocr_engine tesseract

services:

  python-base:
    build:
      context: .
      dockerfile: backend/python-base/Dockerfile
    scale: 0
    network_mode: none

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
      additional_contexts:
        python-base: service:python-base
    ports:
      - "8000:8000"
    environment:
      - OCR_URL=http://ocr:8001
      - RAG_URL=http://rag:8002
      - LLM_URL=http://llm:8003
      - LLM_UNLOAD_BEFORE_OCR=true
    depends_on:
      ocr:
        condition: service_healthy
      rag:
        condition: service_healthy
      llm:
        condition: service_healthy
    networks:
      - manualito-net

  ocr:
    image: tfg-ocr:cpu
    build:
      context: .
      dockerfile: backend/ocr/Dockerfile
      additional_contexts:
        python-base: service:python-base
      args:
        OCR_RUNTIME_STAGE: *ocr_engine
    environment:
      OCR_ENGINE: *ocr_engine
    networks:
      - manualito-net

  rag:
    build:
      context: .
      dockerfile: backend/rag/Dockerfile
      additional_contexts:
        python-base: service:python-base
    environment:
      - CHROMA_URL=http://chroma:8000
      - CHROMA_COLLECTION=manualito_manuals
      - EMBEDDING_MODEL=intfloat/multilingual-e5-small
      - HF_HOME=/root/.cache/huggingface
      # Workaround: chromadb-client arrastra opentelemetry-proto con _pb2 viejo incompatible con protobuf 7.x.
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
    volumes:
      - ./backend/rag/.hf_cache:/root/.cache/huggingface
    depends_on:
      - chroma
    networks:
      - manualito-net

  chroma:
    image: chromadb/chroma:1.5.7
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - manualito-net

  llm:
    build:
      context: .
      dockerfile: backend/llm/Dockerfile
      additional_contexts:
        python-base: service:python-base
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=phi4:14b
      - OLLAMA_KEEP_ALIVE=5m
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    networks:
      - manualito-net

  ollama:
    image: ollama/ollama:0.23.1
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - manualito-net

  # Servicio one-shot: espera a que Ollama esté listo y descarga el modelo si
  # no está ya en el volumen ``ollama-data``. Es idempotente — si el modelo
  # existe, ``ollama pull`` detecta el hash local y sale al instante. Al
  # definirse ``llm: depends_on: ollama-init: service_completed_successfully``,
  # el LLM no arranca hasta que el modelo esté disponible.
  ollama-init:
    image: ollama/ollama:0.23.1
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull phi4:14b"]
    restart: "no"
    networks:
      - manualito-net

networks:
  manualito-net:
    driver: bridge

volumes:
  chromadb-data:
  ollama-data:
