name: ${PROYECT_NAME:-manualito}

x-service-hardening: &service-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
  pids_limit: 256

x-third-party-hardening: &third-party-hardening
  security_opt:
    - no-new-privileges:true

services:

  python-base:
    build:
      context: .
      dockerfile: backend/python-base/Dockerfile
      args:
        UV_VERSION: ${UV_VERSION:?UV_VERSION no definida}
        PYTHON_VERSION: ${PYTHON_VERSION:?PYTHON_VERSION no definida}
        VERSION: ${PYTHON_IMAGE_VERSION:-0.0.1}
    scale: 0
    network_mode: none

  api:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-api
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/api/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    ports:
      - "8000:8000"
    depends_on:
      ocr:
        condition: service_healthy
      rag:
        condition: service_healthy
      llm:
        condition: service_healthy
    networks:
      - manualito-net

  ocr:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-ocr
    env_file:
      - ./config/backend.env
    image: ${PROYECT_NAME:-manualito}-ocr:cpu
    build:
      context: .
      dockerfile: backend/ocr/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        OCR_RUNTIME_STAGE: ${OCR_RUNTIME_STAGE:-tesseract}
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    environment:
      OCR_ENGINE: ${OCR_RUNTIME_STAGE:-tesseract}
    networks:
      - manualito-net

  rag:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-rag
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/rag/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    volumes:
      - rag-hf-cache:/home/appuser/.cache/huggingface
    depends_on:
      - chroma
    networks:
      - manualito-net

  chroma:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-chroma
    image: chromadb/chroma:${CHROMA_VERSION:-1.5.7}
    pids_limit: 256
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - manualito-net

  llm:
    <<: *service-hardening
    container_name: ${PROYECT_NAME:-manualito}-llm
    env_file:
      - ./config/backend.env
    build:
      context: .
      dockerfile: backend/llm/Dockerfile
      additional_contexts:
        - "python-base:${PYTHON_BASE_TAG:-local}=service:python-base"
      args:
        PYTHON_BASE_TAG: ${PYTHON_BASE_TAG:-local}
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    networks:
      - manualito-net

  ollama:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-ollama
    image: ollama/ollama:${OLLAMA_VERSION:-0.23.1}
    pids_limit: 512
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - manualito-net

  # Descarga el modelo si falta.
  ollama-init:
    <<: *third-party-hardening
    container_name: ${PROYECT_NAME:-manualito}-ollama-init
    env_file:
      - ./config/backend.env
    image: ollama/ollama:${OLLAMA_VERSION:-0.23.1}
    pids_limit: 128
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull $$OLLAMA_MODEL"]
    restart: "no"
    networks:
      - manualito-net

networks:
  manualito-net:
    driver: bridge

volumes:
  chromadb-data:
  ollama-data:
  rag-hf-cache:
  ocr-paddlex-cpu-cache:
  ocr-paddlex-gpu-cache:
