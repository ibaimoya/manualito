# Manualito · Nginx config (sirve SPA + reverse proxy a la API FastAPI).
#
# Convenciones:
#   - Escucha 8080 (no-root puede bindear).
#   - Hardening básico: oculta versión, headers de seguridad.
#   - Cache largo para /assets/* (hashed por Vite), no-cache para HTML.
#   - SPA fallback: rutas desconocidas → index.html (React Router se encarga).
#   - Proxy /api/* → api:8000 (servicio interno de Docker Compose).

server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # — Tamaño máximo upload: 25 MB (margen sobre los 20 MB del backend) —
    client_max_body_size 25M;
    client_body_timeout 120s;

    # — Headers seguridad globales —
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP "razonable": permite blobs (cámara/canvas) y data: (svg inline), fuentes self.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

    # — Compresión —
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # — Cache largo para assets hasheados por Vite —
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # — Service worker: NUNCA cachear, debe revalidarse siempre —
    location ~ ^/(sw\.js|workbox-[a-z0-9]+\.js|registerSW\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # — Manifest PWA: revalidar siempre —
    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # — Proxy API → gateway FastAPI por red interna Docker Compose —
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /api/manuals tarda hasta varios minutos por el pipeline OCR+RAG+LLM
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Pasa errores upstream tal cual al cliente.
        proxy_intercept_errors off;
    }

    # — Health del gateway (alias sin /api) —
    location = /health {
        proxy_pass http://api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # — SPA fallback: cualquier ruta cliente cae en index.html —
    location / {
        try_files $uri $uri/ /index.html;
    }

    # — index.html con no-cache para que despliegues nuevos lleguen rápido —
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
