sonar.organization=ibaimoya
sonar.projectKey=ibaimoya_tfg
sonar.projectName=Manualito
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Backend (Python) + Frontend (TypeScript)
sonar.sources=backend/api,backend/common,backend/database,backend/llm,backend/ocr,backend/rag,frontend/src
sonar.tests=backend/tests,frontend/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,backend/tests/**

# Lenguajes
sonar.python.version=3.13

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusiones — caches, dist, código generado
sonar.exclusions=**/__pycache__/**,**/.pytest_cache/**,**/.ruff_cache/**,\
  backend/ocr/.ocr_cache/**,backend/rag/.hf_cache/**,htmlcov/**,.venv/**,dataset/**,\
  frontend/node_modules/**,frontend/dist/**,frontend/coverage/**,frontend/dev-dist/**,\
  frontend/src/routeTree.gen.ts,frontend/src/shared/api/generated/**,secrets/**

# No medir cobertura sobre estos archivos
sonar.coverage.exclusions=backend/database/alembic/**,\
  backend/tests/**,\
  frontend/src/main.tsx,frontend/src/routeTree.gen.ts,\
  frontend/src/shared/api/generated/**,frontend/tests/**,\
  frontend/vite.config.ts,frontend/vitest.config.ts,frontend/eslint.config.js,\
  frontend/openapi-ts.config.ts
